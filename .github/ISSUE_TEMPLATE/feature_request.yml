name: Feature request
description: Suggest an enhancement to Transcription Studio.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing problem, not the implementation you have in mind.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: How would you solve it? Sketch the smallest useful version.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else relevant.
