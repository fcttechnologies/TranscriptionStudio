<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Summarize Videos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
<main class="wrap">
  <h1>Summarize Videos & PDFs</h1>
  <p class="hint">Paste a link or upload a PDF.</p>

  <section id="formBox" class="card">
    <div class="tabs">
      <button id="tabUrl" class="tab active">Video URL</button>
      <button id="tabPdf" class="tab">PDF File</button>
    </div>

    <div id="urlInputBox">
      <label class="label">Video URL</label>
      <input id="url" placeholder="https://…" autocomplete="off"/>
    </div>

    <div id="fileInputBox" class="hidden">
      <label class="label">Upload PDF (max 50MB)</label>
      <div class="fileRow">
         <input type="file" id="fileInput" accept=".pdf" />
      </div>
    </div>

    <div id="titleGroup">
      <label class="label">Title (filename)</label>
      <input id="customTitle" placeholder="Leave blank to auto-title" autocomplete="off"/>
    </div>

    <div class="optionsRow">
      <label class="toggleLabel">
        <span>Transcript only</span>
        <input id="transcriptOnly" type="checkbox"/>
      </label>
      <label class="toggleLabel">
        <span>Save markdown file</span>
        <input id="saveMarkdown" type="checkbox"/>
      </label>
    </div>

    <button id="go">Summarize</button>
  </section>

  <section id="progressBox" class="card hidden">
    <div class="row">
      <div id="statusText">Queued…</div>
      <div id="statusIcon"></div>
    </div>

    <div class="bar"><div id="barFill"></div></div>
    <ol id="steps" class="steps"></ol>

    <div id="resultBox" class="hidden">
      <div id="resultHeadline" class="resultHeadline"></div>
      <div id="filePath" class="filePath"></div>

      <textarea id="pastePack" readonly></textarea>

      <div class="btnRow">
        <button id="copy">Copy</button>
        <button id="again">Summarize another</button>
      </div>
    </div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
